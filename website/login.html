<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In – NaviApex</title>
  <meta name="description" content="Sign in to your NaviApex account to buy boosting, accounts, and coaching.">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<div class="toast-container" id="toastContainer"></div>

<div class="auth-page">
  <div class="auth-bg-glow"></div>

  <!-- Back to Home -->
  <a href="index.html" style="position:absolute; top:24px; left:24px; display:flex; align-items:center; gap:8px; font-size:14px; color:var(--text-secondary); transition: color 0.2s;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='var(--text-secondary)'">
    <i class="fas fa-arrow-left"></i> Back to Home
  </a>

  <div class="auth-card">
    <div class="auth-logo">
      <a href="index.html" class="navbar-logo-text" style="font-family: 'Orbitron', monospace; font-size: 26px; font-weight:800; letter-spacing:2px; text-decoration:none; color:#fff;">
        NAVI<span style="color: var(--apex-red);">APEX</span>
      </a>
    </div>

    <h1 class="auth-title">Welcome Back</h1>
    <p class="auth-subtitle">Sign in to your NaviApex account</p>

    <form id="loginForm">
      <div class="form-group">
        <label class="form-label" for="loginEmail">Email or Username</label>
        <input
          type="text"
          class="form-input"
          id="loginEmail"
          placeholder="Enter email or username"
          autocomplete="username"
          required
        >
      </div>

      <div class="form-group">
        <label class="form-label" for="loginPassword" style="display:flex; justify-content:space-between;">
          Password
          <a href="#" style="color:var(--apex-red); font-weight:400; text-transform:none; font-size:12px; letter-spacing:0;" onclick="showForgotPassword()">Forgot password?</a>
        </label>
        <div style="position:relative;">
          <input
            type="password"
            class="form-input"
            id="loginPassword"
            placeholder="Enter password"
            autocomplete="current-password"
            required
          >
          <button type="button" onclick="togglePass('loginPassword', this)" style="position:absolute; right:12px; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:15px;">
            <i class="fas fa-eye"></i>
          </button>
        </div>
      </div>

      <button type="submit" class="btn btn-primary" id="loginBtn" style="width:100%; margin-top:8px; padding:14px;">
        <i class="fas fa-sign-in-alt"></i>
        <span>Sign In</span>
      </button>

      <div style="margin-top:16px; padding:14px; background: rgba(255,215,0,0.05); border:1px solid rgba(255,215,0,0.2); border-radius:8px;">
        <div style="font-size:12px; color:var(--text-muted); margin-bottom:6px; text-transform:uppercase; letter-spacing:0.5px;">👑 Owner Login</div>
        <div style="font-size:13px; color:var(--apex-gold);">Email: <strong>owner@navipex.gg</strong></div>
        <div style="font-size:13px; color:var(--apex-gold);">Password: <strong>NaviApex2026!</strong></div>
      </div>
    </form>

    <div class="auth-divider"><span>or continue with</span></div>

    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
      <button class="btn btn-ghost" onclick="showToast('Social login coming soon!', 'info')">
        <i class="fab fa-google" style="color:#ea4335;"></i> Google
      </button>
      <button class="btn btn-ghost" onclick="showToast('Social login coming soon!', 'info')">
        <i class="fab fa-discord" style="color:#5865f2;"></i> Discord
      </button>
    </div>

    <div class="auth-footer">
      Don't have an account? <a href="signup.html">Sign up free</a>
    </div>
  </div>
</div>

<script src="app.js"></script>
<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;

  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Logging in...';

  clearFieldError('loginEmail');
  clearFieldError('loginPassword');

  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in...';

  try {
    const result = await loginUser(email, password);
    if (result.success) {
      setUser(result.user);
      showToast(`Welcome back, ${result.user.username}! 🎮`, 'success');
      setTimeout(() => {
        window.location.href = 'dashboard.html';
      }, 1000);
    } else {
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
      showToast(result.error, 'error');
      showFieldError('loginPassword', result.error);
    }
  } catch (err) {
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
    showToast('Failed to connect to server', 'error');
  }
});

function togglePass(inputId, btn) {
  const input = document.getElementById(inputId);
  if (input.type === 'password') {
    input.type = 'text';
    btn.innerHTML = '<i class="fas fa-eye-slash"></i>';
  } else {
    input.type = 'password';
    btn.innerHTML = '<i class="fas fa-eye"></i>';
  }
}

function showForgotPassword() {
  showToast('Password reset link sent to your email!', 'info');
}

// If already logged in, redirect
const user = getUser();
if (user) {
  window.location.href = user.role === 'owner' ? 'admin.html' : 'dashboard.html';
}
</script>
</body>
</html>
